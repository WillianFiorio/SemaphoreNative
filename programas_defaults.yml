- hosts: all
  become: yes
  tasks:
    - name: Garantir que sngrep está instalado
      ansible.builtin.apt:
        name: sngrep
        state: present

    - name: Garantir que nmon está instalado
      ansible.builtin.apt:
        name: nmon
        state: present

    - name: Garantir que o htop está instalado
      ansible.builtin.apt:
        name: htop
        state: present

    - name: Garantir que o ncdu está instalado
      ansible.builtin.apt:
        name: ncdu
        state: present

    - name: Garantir que o tcpdump está instalado
      ansible.builtin.apt:
        name: tcpdump
        state: present

    - name: Coletar serviços
      ansible.builtin.service_facts:

    - name: Ativar NTP se timesyncd não estiver ativo
      command: timedatectl set-ntp true
      when: "'systemd-timesyncd.service' not in ansible_facts.services or ansible_facts.services['systemd-timesyncd.service'].state != 'running'"

    - name: Garantir que timesyncd está ativo
      ansible.builtin.service:
        name: systemd-timesyncd
        state: started
        enabled: yes
        
    - name: Detectar o virtualizador
      command: systemd-detect-virt
      register: virt_type
      changed_when: false
    
    - name: Instalar open-vm-tools se for VMware
      ansible.builtin.apt:
        name: open-vm-tools
        state: present
        update_cache: yes
      when: virt_type.stdout == "vmware"
    
    - name: Habilitar e iniciar open-vm-tools (VMware)
      systemd:
        name: open-vm-tools
        enabled: yes
        state: started
      when: virt_type.stdout == "vmware"
    
    - name: Instalar qemu-guest-agent se for KVM
      ansible.builtin.apt:
        name: qemu-guest-agent
        state: present
      when: virt_type.stdout in ["kvm", "qemu"]
    
    - name: Habilitar e iniciar qemu-guest-agent (KVM)
      systemd:
        name: qemu-guest-agent
        enabled: yes
        state: started
      when: virt_type.stdout in ["kvm", "qemu"]  
